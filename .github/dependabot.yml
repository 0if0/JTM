# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuring-dependabot-version-updates
---
version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    ignore:
      # This action is used by Dependabot's own runner and can trigger
      # Node runtime deprecation warnings that we cannot fix in-repo.
      - dependency-name: github/dependabot-action
