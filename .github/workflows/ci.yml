# Build and test the Jenkins plugin (HPI module: jtm-plugin/)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Maven verify
        run: mvn -B -ntp -f jtm-plugin/pom.xml clean verify

      - name: Upload HPI (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: jenkins-test-management-hpi
          path: jtm-plugin/target/*.hpi
          if-no-files-found: error
