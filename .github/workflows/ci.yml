# Build and test the Jenkins plugin (Maven project at repository root)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - jdk: 21
            maven_args: clean verify
          - jdk: 25
            maven_args: -DskipTests clean verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: maven

      - name: Maven verify
        run: mvn -B -ntp ${{ matrix.maven_args }}

      - name: Upload HPI (artifact)
        uses: actions/upload-artifact@v5
        with:
          name: jtm-hpi-jdk${{ matrix.jdk }}
          path: target/*.hpi
          if-no-files-found: error

  e2e-smoke:
    needs: verify
    runs-on: ubuntu-latest
    env:
      JENKINS_BASE_URL: ${{ secrets.JENKINS_BASE_URL }}
      JENKINS_USER: ${{ secrets.JENKINS_USER }}
      JENKINS_PASSWORD: ${{ secrets.JENKINS_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Run Playwright smoke
        if: ${{ env.JENKINS_BASE_URL != '' && env.JENKINS_USER != '' && env.JENKINS_PASSWORD != '' }}
        working-directory: e2e
        run: 'npx playwright test --grep "dashboard: project apply keeps scope in navigation"'
