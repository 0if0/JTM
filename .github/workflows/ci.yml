# Build and test the Jenkins plugin (Maven project at repository root)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        jdk: [21, 25]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: maven

      - name: Maven verify
        run: mvn -B -ntp clean verify

      - name: Upload HPI (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: jtm-hpi-jdk${{ matrix.jdk }}
          path: target/*.hpi
          if-no-files-found: error

  e2e-smoke:
    needs: verify
    if: ${{ secrets.JENKINS_BASE_URL != '' && secrets.JENKINS_USER != '' && secrets.JENKINS_PASSWORD != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Run Playwright smoke
        working-directory: e2e
        env:
          JENKINS_BASE_URL: ${{ secrets.JENKINS_BASE_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_PASSWORD: ${{ secrets.JENKINS_PASSWORD }}
        run: 'npx playwright test --grep "dashboard: project apply keeps scope in navigation"'
